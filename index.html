<!DOCTYPE html>
<html lang="pt-br">
    <head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">

	<title>Crie seu site</title>

	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Geist+Pixel&display=swap" rel="stylesheet">

	<link rel="stylesheet" href="style.css">
    </head>
    <body>
 	<header>
		<p class="top">Gerar.com - Seu gerador com inteligência artificial 🤖</p>
	</header>
	<main>
		<h1 class="titulo">
			<span class="parte1">Crie sua página</span>
			<br>
			<span class="parte2">com um prompt</span>
		</h1>
		<p class="down">Descreva o seu negócio e veja a IA criar uma página profissional em segundos</p>
		<div class="input-area" id="gerador">
			<input type="text" id="prompt-usuario" placeholder="No que você está pensando?"/>
			<button onclick="gerarCodigo()">Gerar Página</button>
		</div>
			<div class="code-area">
				<p class="bloco-codigo" id="resultado"></p>
				<iframe id="preview-site" class="bloco-site" sandbox="allow-scripts"></iframe>
			</div>
	</main>
    </body>
	<script src="script.js" defer>

	</script>
</html>
